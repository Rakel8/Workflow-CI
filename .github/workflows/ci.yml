name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: "3.10"
          activate-environment: msml_pipeline

      - name: Install MLflow & DagsHub
        shell: bash -l {0}
        run: |
          pip install mlflow dagshub

      - name: Run MLflow Project
        shell: bash -l {0}
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Menjalankan pipeline MLflow sesuai standar Dicoding
          mlflow run MLProject/

      - name: Upload Artifacts to GitHub (Save to GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/local_model/

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image using MLflow
        shell: bash -l {0}
        run: |
          # Membungkus model lokal ke dalam Docker Image sesuai syarat Dicoding
          mlflow models build-docker -m MLProject/local_model -n ${{ secrets.DOCKER_USERNAME }}/msml-loan-approval:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/msml-loan-approval:latest